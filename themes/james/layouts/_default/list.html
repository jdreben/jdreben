{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
</div>

<div class="post-list">
  {{ range .Pages }}
  <article class="post-card">
    <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">
      {{ .Date.Format "Jan 2, 2006" }}
    </time>
    <h2 class="post-title">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </h2>
    {{ with .Description }}
    <p class="post-excerpt">{{ . }}</p>
    {{ end }}
    {{ with .Params.tags }}
    <div class="post-tags">
      {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
  </article>
  {{ end }}
</div>
{{ end }}
