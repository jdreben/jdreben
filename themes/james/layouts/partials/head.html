<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">

<title>
  {{- if .IsHome -}}
    {{ .Site.Title }} — {{ .Site.Params.description }}
  {{- else -}}
    {{ .Title }} · {{ .Site.Title }}
  {{- end -}}
</title>

<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else if .Description }}{{ .Description }}{{ else }}{{ .Summary | truncate 160 }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author }}">

<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else if .Description }}{{ .Description }}{{ else }}{{ .Summary | truncate 160 }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">

<link rel="canonical" href="{{ .Permalink }}">

{{ if .OutputFormats.Get "rss" }}
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}"
  href="{{ (.OutputFormats.Get `rss`).Permalink }}">
{{ end }}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
