<footer class="site-footer">
  <div class="footer-inner">
    <span>{{ now.Format "2006" }} · {{ .Site.Params.author }} · San Juan, PR</span>
    <nav class="footer-links">
      <a href="{{ .Site.Params.github }}" rel="me noopener">GitHub</a>
      <a href="{{ .Site.Params.mastodon }}" rel="me noopener">Mastodon</a>
      <a href="{{ .Site.Params.bluesky }}" rel="me noopener">Bluesky</a>
      <a href="{{ .Site.Params.linkedin }}" rel="me noopener">LinkedIn</a>
      <a href="/index.xml" title="RSS feed">RSS</a>
    </nav>
  </div>
  {{ $sha := .Site.Params.commit }}
  {{ $shortSha := cond (gt (len $sha) 7) (substr $sha 0 7) $sha }}
  <div class="build-info">
    Last built {{ now.Format "Jan 2, 2006 · 15:04 MST" }}{{ with $shortSha }} ·
    <a href="https://github.com/jdreben/jdreben/commit/{{ $sha }}" rel="noopener"><code>{{ . }}</code></a>{{ end }}
  </div>
</footer>
